name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug environment
        run: |
          echo "--- Node / NPM versions ---"
          node -v || true
          npm -v || true
          echo "--- Workspace pwd / listing ---"
          pwd
          ls -la
          echo "--- package.json ---"
          cat package.json || true

      - run: npm ci
      - name: Build (verbose)
        env:
          VITE_LASTFM_USERNAME: aethom00
          VITE_LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          set -x
          npm run build
          echo "--- dist contents ---"
          ls -la dist || true
          echo "--- add SPA fallback (404.html) ---"
          if [ -f dist/index.html ]; then cp dist/index.html dist/404.html || true; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
